<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Registration Form</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-gray-100 flex items-center justify-center min-h-screen px-4">
    <div
      id="form-container"
      class="bg-white shadow-lg rounded-lg p-8 w-full max-w-md transition-all duration-300"
    >
      <h1 class="text-2xl font-semibold text-center mb-6 text-gray-800">
        Formulário de Cadastro!
      </h1>

      <form id="registration-form" class="space-y-4">
        <div>
          <label for="name" class="block text-sm font-medium text-gray-700">
            Nome
          </label>
          <input
            type="text"
            id="name"
            class="mt-1 block w-full rounded-md border border-gray-300 shadow-sm py-2 px-3 focus:outline-none"
          />
          <p class="text-red-500 text-sm mt-1 hidden" id="name-error">
            O nome é obrigatório!
          </p>
        </div>

        <div>
          <label for="email" class="block text-sm font-medium text-gray-700">
            Email
          </label>
          <input
            type="email"
            id="email"
            class="mt-1 block w-full rounded-md border border-gray-300 shadow-sm py-2 px-3 focus:outline-none"
          />
          <p class="text-red-500 text-sm mt-1 hidden" id="email-error">
            O email é obrigatório!
          </p>
        </div>

        <div>
          <label for="phone" class="block text-sm font-medium text-gray-700">
            Telefone
          </label>
          <input
            type="tel"
            id="phone"
            class="mt-1 block w-full rounded-md border border-gray-300 shadow-sm py-2 px-3 focus:outline-none"
          />
          <p class="text-red-500 text-sm mt-1 hidden" id="phone-error">
            O telefone é obrigatório!
          </p>
        </div>

        <button
          type="submit"
          class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-4 rounded-md transition duration-200"
        >
          Enviar
        </button>
      </form>
    </div>

    <div
      id="success-message"
      class="hidden bg-green-100 border border-green-400 text-green-700 px-6 py-8 rounded-lg max-w-md w-full text-center shadow-md"
    >
      <h2 class="text-2xl font-semibold mb-4">
        ✅ Registro realizado com sucesso !
      </h2>
      <p class="mb-6">
        Obrigado por se registrar. Seus dados foram enviados com sucesso.
      </p>
      <button
        id="back-button"
        class="bg-green-600 hover:bg-green-700 text-white py-2 px-4 rounded-md transition duration-200"
      >
        Voltar ao formulário
      </button>
    </div>

    <script src="index.js"></script>
  </body>
</html>
